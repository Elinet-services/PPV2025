name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - jirkas-branch
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure MDB Git access
        run: |
          git config --global url."https://oauth2:${MDB_GIT_TOKEN}@git.mdbootstrap.com/".insteadOf "https://@git.mdbootstrap.com/"
          git config --global url."https://oauth2:${MDB_GIT_TOKEN}@git.mdbootstrap.com/".insteadOf "https://git.mdbootstrap.com/"
        env:
          MDB_GIT_TOKEN: ${{ secrets.MDB_GIT_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

      - name: Build application
        run: npm run build
