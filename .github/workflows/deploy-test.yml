name: Deploy Test

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy to test
        required: false
        default: main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure MDB Git access
        run: |
          git config --global url."https://oauth2:${MDB_GIT_TOKEN}@git.mdbootstrap.com/".insteadOf "https://@git.mdbootstrap.com/"
          git config --global url."https://oauth2:${MDB_GIT_TOKEN}@git.mdbootstrap.com/".insteadOf "https://git.mdbootstrap.com/"
        env:
          MDB_GIT_TOKEN: ${{ secrets.MDB_GIT_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

      - name: Build test bundle
        run: npm run build:test

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.WEB_DEPLOY_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${WEB_DEPLOY_HOST}" >> ~/.ssh/known_hosts
        env:
          WEB_DEPLOY_HOST: ${{ vars.WEB_DEPLOY_HOST }}

      - name: Upload build
        run: rsync -az --delete build/ "${WEB_DEPLOY_USER}@${WEB_DEPLOY_HOST}:${WEB_DEPLOY_PATH}"
        env:
          WEB_DEPLOY_HOST: ${{ vars.WEB_DEPLOY_HOST }}
          WEB_DEPLOY_PATH: ${{ vars.WEB_DEPLOY_PATH }}
          WEB_DEPLOY_USER: ${{ secrets.WEB_DEPLOY_USER }}
